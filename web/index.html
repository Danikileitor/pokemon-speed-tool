<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Champions — Speed Tier Comparator</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="css/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="scanlines"></div>
  <div class="grid-bg"></div>

  <button id="afd-toggle" title="Easter egg" aria-label="April Fools mode">🎭</button>
  <header>
    <div class="header-inner">
      <div class="logo-mark">
        <img src="icons/apple-touch-icon.png" alt="Logo">
      </div>
      <div class="header-text">
        <h1>Speed Tier <span class="accent">Comparator</span></h1>
        <p class="subtitle">Pokémon Champions</p>
      </div>
    </div>
  </header>

  <main>
    <div class="panels">
      <!-- Pokemon A -->
      <div class="panel" id="panel-a">
        <div class="panel-label">POKÉMON A</div>
        <div class="panel-content">
          <div class="pokemon-selector">
            <label class="field-label">Select a Pokémon</label>
            <div class="select-wrapper">
              <input type="text" id="search-a" class="pokemon-search" placeholder="Search Pokémon..."
                autocomplete="off">
              <div class="dropdown" id="dropdown-a"></div>
            </div>
            <div class="selected-pokemon" id="selected-a">
              <div class="pokemon-display">
                <div class="poke-icon-wrap" id="icon-a">
                  <div class="poke-placeholder">?</div>
                </div>
                <span class="pokemon-name" id="name-a">—</span>
                <div class="pokemon-types" id="types-a"></div>
              </div>
            </div>
          </div>

          <div class="modifiers">
            <div class="modifier-group">
              <label class="field-label">Mod (+/-)</label>
              <div class="segmented" id="boost-a">
                <button class="seg-btn" data-val="-2">−2</button>
                <button class="seg-btn" data-val="-1">−1</button>
                <button class="seg-btn active" data-val="0">0</button>
                <button class="seg-btn" data-val="1">+1</button>
                <button class="seg-btn" data-val="2">+2</button>
              </div>
              <div class="slider-row">
                <span class="slider-label-end">−6</span>
                <input type="range" id="boost-slider-a" class="boost-slider" min="-6" max="6" step="1" value="0">
                <span class="slider-label-end">+6</span>
                <span class="slider-value-display" id="boost-display-a">0</span>
              </div>
            </div>

            <div class="modifier-group">
              <label class="field-label">SP</label>
              <div class="segmented" id="evs-a">
                <button class="seg-btn active" data-val="32+">32+</button>
                <button class="seg-btn" data-val="32">32</button>
                <button class="seg-btn" data-val="0">0</button>
                <button class="seg-btn" data-val="0-">0−</button>
              </div>
              <div class="slider-row sp-slider-row">
                <span class="slider-label-end">0</span>
                <input type="range" id="sp-slider-a" class="sp-slider" min="0" max="32" step="1" value="32">
                <span class="slider-label-end">32</span>
                <span class="slider-value-display" id="sp-display-a">32</span>
              </div>
              <div class="nature-row" id="nature-a">
                <span class="nature-label">Nature</span>
                <div class="nature-btns">
                  <button class="nature-btn" data-val="-">−</button>
                  <button class="nature-btn" data-val="=">= </button>
                  <button class="nature-btn active" data-val="+">+</button>
                </div>
              </div>
            </div>
            <div class="modifier-group">
              <label class="field-label">Others</label>
              <div class="effects-grid" id="effects-a">
                <button class="effect-btn" data-val="scarf" title="Choice Scarf">🧣 Scarf</button>
                <button class="effect-btn" data-val="swift"
                  title="Swift Swim / Chlorophyll / Sand Rush / Slush Rush / Surge Surfer">✨ Ability</button>
                <button class="effect-btn" data-val="tailwind" title="Tailwind">💨 Tailwind</button>
                <button class="effect-btn" data-val="ironball" title="Iron Ball">⚫ Iron Ball</button>
                <button class="effect-btn" data-val="paralysis" title="Parálisis">⚡ Paralysis</button>
                <button class="effect-btn" data-val="trickroom" title="Trick Room">🔀 Trick Room</button>
              </div>
            </div>
          </div>

          <div class="speed-result" id="result-a">
            <div class="result-label">Speed</div>
            <div class="result-value" id="speed-a">—</div>
          </div>
        </div>
      </div>

      <!-- VS Divider -->
      <div class="vs-divider">
        <div class="vs-line"></div>
        <div class="vs-badge" id="vs-outcome">VS</div>
        <div class="vs-line"></div>
      </div>

      <!-- Pokemon B -->
      <div class="panel" id="panel-b">
        <div class="panel-label">POKÉMON B</div>
        <div class="panel-content">
          <div class="pokemon-selector">
            <label class="field-label">Select a Pokémon</label>
            <div class="select-wrapper">
              <input type="text" id="search-b" class="pokemon-search" placeholder="Search Pokémon..."
                autocomplete="off">
              <div class="dropdown" id="dropdown-b"></div>
            </div>
            <div class="selected-pokemon" id="selected-b">
              <div class="pokemon-display">
                <div class="poke-icon-wrap" id="icon-b">
                  <div class="poke-placeholder">?</div>
                </div>
                <span class="pokemon-name" id="name-b">—</span>
                <div class="pokemon-types" id="types-b"></div>
              </div>
            </div>
          </div>

          <div class="modifiers">
            <div class="modifier-group">
              <label class="field-label">Mod (+/-)</label>
              <div class="segmented" id="boost-b">
                <button class="seg-btn" data-val="-2">−2</button>
                <button class="seg-btn" data-val="-1">−1</button>
                <button class="seg-btn active" data-val="0">0</button>
                <button class="seg-btn" data-val="1">+1</button>
                <button class="seg-btn" data-val="2">+2</button>
              </div>
              <div class="slider-row">
                <span class="slider-label-end">−6</span>
                <input type="range" id="boost-slider-b" class="boost-slider" min="-6" max="6" step="1" value="0">
                <span class="slider-label-end">+6</span>
                <span class="slider-value-display" id="boost-display-b">0</span>
              </div>
            </div>

            <div class="modifier-group">
              <label class="field-label">SP</label>
              <div class="segmented" id="evs-b">
                <button class="seg-btn active" data-val="32+">32+</button>
                <button class="seg-btn" data-val="32">32</button>
                <button class="seg-btn" data-val="0">0</button>
                <button class="seg-btn" data-val="0-">0−</button>
              </div>
              <div class="slider-row sp-slider-row">
                <span class="slider-label-end">0</span>
                <input type="range" id="sp-slider-b" class="sp-slider" min="0" max="32" step="1" value="32">
                <span class="slider-label-end">32</span>
                <span class="slider-value-display" id="sp-display-b">32</span>
              </div>
              <div class="nature-row" id="nature-b">
                <span class="nature-label">Nature</span>
                <div class="nature-btns">
                  <button class="nature-btn" data-val="-">−</button>
                  <button class="nature-btn" data-val="=">= </button>
                  <button class="nature-btn active" data-val="+">+</button>
                </div>
              </div>
            </div>
            <div class="modifier-group">
              <label class="field-label">Others</label>
              <div class="effects-grid" id="effects-b">
                <button class="effect-btn" data-val="scarf" title="Choice Scarf">🧣 Scarf</button>
                <button class="effect-btn" data-val="swift"
                  title="Swift Swim / Chlorophyll / Sand Rush / Slush Rush / Surge Surfer">✨ Ability</button>
                <button class="effect-btn" data-val="tailwind" title="Tailwind">💨 Tailwind</button>
                <button class="effect-btn" data-val="ironball" title="Iron Ball">⚫ Iron Ball</button>
                <button class="effect-btn" data-val="paralysis" title="Parálisis">⚡ Paralysis</button>
                <button class="effect-btn" data-val="trickroom" title="Trick Room">🔀 Trick Room</button>
              </div>
            </div>
          </div>

          <div class="speed-result" id="result-b">
            <div class="result-label">Speed</div>
            <div class="result-value" id="speed-b">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- All Matching Tiers -->
    <div class="tiers-section" id="tiers-section">
      <div class="tiers-header">
        <span>SPEED TIERS</span>
        <span class="tiers-hint">Select a Pokémon to view its speed tiers</span>
      </div>
      <div class="tiers-grid" id="tiers-grid">
        <div class="tiers-empty">Select a Pokémon to view its available speed levels</div>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
